apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: error-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pratik50/I.R.I.S.
    targetRevision: HEAD
    path: k8s-manifests/error-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
