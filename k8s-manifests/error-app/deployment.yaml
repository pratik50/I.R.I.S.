apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-app
  namespace: default
  labels:
    app: error-app
  annotations:
    iris.argoproj.io/app: error-app
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app: error-app
  template:
    metadata:
      labels:
        app: error-app
    spec:
      containers:
      - name: error-app
        image: nginx:1.28
        command:
        - sh
        - -c
        args:
        - echo "crash" && exit 1
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
